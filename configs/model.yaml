# ──────────────────────────────────────────────
# AIT Visual Inspector — Model Configuration
# ──────────────────────────────────────────────

# Model architecture
model_size: yolov8s          # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
pretrained: true             # Use COCO pretrained weights as starting point

# Training hyperparameters
training:
  epochs: 100
  batch_size: 16
  img_size: 640
  lr0: 0.01                  # Initial learning rate
  lrf: 0.01                  # Final learning rate (fraction of lr0)
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  patience: 20               # Early stopping patience (0 = disabled)
  seed: 42                   # Reproducibility

# Augmentation (Ultralytics built-in)
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  shear: 2.0
  flipud: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1

# Inference
inference:
  conf_threshold: 0.25       # Confidence threshold
  iou_threshold: 0.45        # NMS IoU threshold
  max_det: 300               # Max detections per image

# Paths
paths:
  weights_dir: runs/train
  export_dir: runs/export
