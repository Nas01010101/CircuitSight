version: "3.8"

services:
  api:
    build: .
    container_name: ait-api
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./runs:/app/runs:ro
      - ./data/inbox:/app/data/inbox
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  dashboard:
    build: .
    container_name: ait-dashboard
    command: streamlit run app.py -- --config configs/app.yaml
    ports:
      - "8501:8501"
    volumes:
      - ./configs:/app/configs:ro
      - ./runs:/app/runs:ro
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - api
